name: Generate Snake Animation

on:
  # Runs automatically every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Also runs whenever you push to main branch
  push:
    branches:
      - main

  # Lets you run it manually from the Actions tab
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Generate the snake SVGs
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jakkalilokesh
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 2: Push the generated SVGs to the "output" branch
      - name: Push Snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
